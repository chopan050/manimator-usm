services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./media:/manim/media
    depends_on:
      - redis

  worker:
    build: ./backend
    command: celery -A app.tasks worker --loglevel=info
    volumes:
      - ./media:/manim/media
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  redis:
    image: redis:7
